services:
  mongo:
    image: mongo:7
    # Auth ON. A replica set with --auth needs a keyfile for internal member auth;
    # we generate it once into a named volume and chown it to the mongodb user, so
    # no secret lives in the repo and host/container ownership issues don't arise.
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    entrypoint:
      - bash
      - -c
      - |
        set -e
        KF=/etc/mongo-keyfile/keyfile
        if [ ! -s "$$KF" ]; then openssl rand -base64 756 > "$$KF"; fi
        chmod 400 "$$KF"; chown mongodb:mongodb "$$KF"
        exec docker-entrypoint.sh mongod --replSet rs0 --bind_ip_all --keyFile "$$KF" --auth
    # Bind to localhost only: reachable from the host for dev tools (Compass/mongosh)
    # but NOT exposed to the LAN. Containers still reach it via the Docker network.
    ports: ["127.0.0.1:27017:27017"]
    volumes:
      - "mongo_data:/data/db"
      - "mongo_keyfile:/etc/mongo-keyfile"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-init:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    environment:
      MONGO_ROOT_USER: ${MONGO_ROOT_USER}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    entrypoint:
      - bash
      - -c
      - |
        mongosh --host mongo -u "$$MONGO_ROOT_USER" -p "$$MONGO_ROOT_PASSWORD" \
          --authenticationDatabase admin --quiet --eval \
          'try { rs.status().ok } catch(e) { rs.initiate({_id:"rs0",members:[{_id:0,host:"mongo:27017"}]}) }'

  redis:
    image: redis:7-alpine
    # Auth ON via requirepass; localhost-only (see mongo note) — not exposed to the LAN.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports: ["127.0.0.1:6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    env_file: .env
    ports: ["8000:8000"]
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes: ["./backend:/app"]

  worker:
    build: ./backend
    env_file: .env
    depends_on: [api, redis, mongo]
    command: celery -A app.workers.celery_app worker -l info
    volumes: ["./backend:/app"]

  beat:
    build: ./backend
    env_file: .env
    depends_on: [redis, mongo]
    command: celery -A app.workers.celery_app beat -l info
    volumes: ["./backend:/app"]

  web:
    build: ./frontend
    env_file: .env
    ports: ["3000:3000"]
    depends_on: [api]
    command: npm run dev
    volumes: ["./frontend:/app", "/app/node_modules"]

volumes:
  mongo_data:
  mongo_keyfile:
