services:
  mongo:
    image: mongo:7
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports: ["27017:27017"]
    volumes: ["mongo_data:/data/db"]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-init:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      bash -c 'mongosh --host mongo --eval "try { rs.status() } catch(e) { rs.initiate({_id:\"rs0\",members:[{_id:0,host:\"mongo:27017\"}]}) }"'

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    env_file: .env
    ports: ["8000:8000"]
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes: ["./backend:/app"]

  worker:
    build: ./backend
    env_file: .env
    depends_on: [api, redis, mongo]
    command: celery -A app.workers.celery_app worker -l info
    volumes: ["./backend:/app"]

  beat:
    build: ./backend
    env_file: .env
    depends_on: [redis, mongo]
    command: celery -A app.workers.celery_app beat -l info
    volumes: ["./backend:/app"]

  web:
    build: ./frontend
    env_file: .env
    ports: ["3000:3000"]
    depends_on: [api]
    command: npm run dev
    volumes: ["./frontend:/app", "/app/node_modules"]

volumes:
  mongo_data:
