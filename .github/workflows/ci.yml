name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend (ruff · mypy · pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check .
      - name: Pytest
        run: pytest -q
      # Not yet enforced — the codebase has not had a full type pass. Surfaces
      # issues without blocking; flip to a hard gate once clean.
      - name: Mypy (advisory)
        run: mypy app
        continue-on-error: true

  frontend:
    name: Frontend (tsc · lint · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm install
      # Advisory while next.config.js sets ignoreBuildErrors/ignoreDuringBuilds.
      # The goal is to drive these to zero, then remove the ignores + continue-on-error.
      - name: Type-check (advisory)
        run: npm run typecheck
        continue-on-error: true
      - name: Lint (advisory)
        run: npm run lint
        continue-on-error: true
      - name: Build
        run: npm run build
